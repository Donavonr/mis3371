<!doctype html>
<!--

    Description: A medical registration form with validation rules. 
-->
<html>
    <head>
        <meta charset="utf-8">

        <title>Donavon Homework 2</title>


        <link rel="stylesheet" href="style.css">
    </head>
    <body>
<div id="header">

  <img id="logo" src="vejq5m3sm4396c01m3etnnp4r8.png" alt="Logo"> 

  <div class="header-inner">
    <div class="header-title">Brazos Healthcare Clinic</div>
  </div>

  <div class="header-date">
    Today's date: <span id="today"></span>
  </div>

</div>        <!-- header section-->
        <hr>  
        <div id="body">
<form action="thankyou.html"> 
    <table class="form">
    <tr class="form">
        <th class="form" colspan="3">Portal Information</th>
    </tr>
    <tr class="form">
    <td align="right">
        <label for="firstname">First Name</label>
    </td>
    <td>
        <input type="text"
               id="firstname"
               name="firstname"
            maxlength="30" required>
               
    </td>
</tr>

<tr class="form">
    <td align="right">
        <label for="middleinit">Middle Initial</label>
        </td>
        <td>
                <input type="text"
                    id="middleinit"
                    name="middleinit"
                    maxlength="1">
    </td>
</tr>

<tr class="form">
    <td align="right">
        <label for="lastname">Last Name</label>
    </td>
    <td>
        <input type="text"
               id="lastname"
               name="lastname"
              maxlength="30" required>
    </td>
</tr>
       <!-- Sex Radio buttons row -->
       <tr class="form">
           <td align="right">Sex</td>
           <td>
               <label><input type="radio" name="sex" value="Male" required> Male</label>
               <label><input type="radio" name="sex" value="Female" required> Female</label>
               <label><input type="radio" name="sex" value="Other" required> Other</label>
             </td>
           </tr>
       <tr class="form">
           <td align="right">
               <label for="dob">Date of Birth</label>
           </td>
           <td>
               <input type= "text"
                      id="dob"
                      name="dob"
                      placeholder="MM/DD/YYYY"
                      maxlength="10"
                      pattern="^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/\d{4}$"
           required>
  </td>
</tr>
       <tr class="form">
           <td align="right">
               <label for="ssn">Social Security</label>
   </td>
       <td>
           <input type="password"
                  id="ssn"
                  name="ssn"
                  placeholder="123-45-6789"
                  minlength="9"
                  maxlength="11"
                  required>
           </td>
       </tr>
           
    <tr  class="form">
        <td align="right">
            <label for="addr1" >Address Line 1</label>
        </td>
        <td>
            <input type="text" 
                    size="20" 
                    minlength="4"
                    maxlength="30" 
                    id="addr1" 
                    name="addr1" 
                    required
                    oninvalid="this.setCustomValidity('At least 1 address line Required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="1234 Main St (req'd)"
            >
        <span id="addr1_text"></span></td>
    </tr>
    <tr  class="form">
        <td align="right">
            <label for="addr2">Address Line 2</label>
        </td>
        <td>
            <input type="text" 
                    size="20" 
                    maxlength="30" 
                    id="addr2" 
                    name="addr2" 
                    placeholder="Apt #, etc..."
            >
            <span id="addr2_text">
        </td>
    </tr>
       
    <tr class="form">
  <td align="right">
    City, ST, Zip
  </td>

  <td class="cityrow">
    <input type="text"
           id="city"
           name="city"
           maxlength="30"
           placeholder="Anytown (req'd)"
           required
           oninvalid="this.setCustomValidity('You forgot City')"
           oninput="this.setCustomValidity('')">

    <select id="state" name="state" required>
      <option value=""></option>
      <option value="AL">Alabama</option>
      <option value="AK">Alaska</option>
      <option value="AZ">Arizona</option>
      <option value="AR">Arkansas</option>
      <option value="CA">California</option>
      <option value="CO">Colorado</option>
      <option value="CT">Connecticut</option>
      <option value="DE">Delaware</option>
      <option value="FL">Florida</option>
      <option value="GA">Georgia</option>
      <option value="HI">Hawaii</option>
      <option value="ID">Idaho</option>
      <option value="IL">Illinois</option>
      <option value="IN">Indiana</option>
      <option value="IA">Iowa</option>
      <option value="KS">Kansas</option>
      <option value="KY">Kentucky</option>
      <option value="LA">Louisiana</option>
      <option value="ME">Maine</option>
      <option value="MD">Maryland</option>
      <option value="MA">Massachusetts</option>
      <option value="MI">Michigan</option>
      <option value="MN">Minnesota</option>
      <option value="MS">Mississippi</option>
      <option value="MO">Missouri</option>
      <option value="MT">Montana</option>
      <option value="NE">Nebraska</option>
      <option value="NV">Nevada</option>
      <option value="NH">New Hampshire</option>
      <option value="NJ">New Jersey</option>
      <option value="NM">New Mexico</option>
      <option value="NY">New York</option>
      <option value="NC">North Carolina</option>
      <option value="ND">North Dakota</option>
      <option value="OH">Ohio</option>
      <option value="OK">Oklahoma</option>
      <option value="OR">Oregon</option>
      <option value="PA">Pennsylvania</option>
      <option value="RI">Rhode Island</option>
      <option value="SC">South Carolina</option>
      <option value="SD">South Dakota</option>
      <option value="TN">Tennessee</option>
      <option value="TX">Texas</option>
      <option value="UT">Utah</option>
      <option value="VT">Vermont</option>
      <option value="VA">Virginia</option>
      <option value="WA">Washington</option>
      <option value="WV">West Virginia</option>
      <option value="WI">Wisconsin</option>
      <option value="WY">Wyoming</option>
    </select>

    <input type="text" 
                    pattern="[0-9]{5}"
                    size="5"
                    maxlength="5" 
                    id="zip" 
                    name="zip" 
                    required
                    oninvalid="this.setCustomValidity('5 Digit Zip/Postal Code required')"
                    oninput="this.setCustomValidity('')"
                    placeholder="00000">

    <span id="City_text"></span>
    <span id="State_text"></span>
  </td>
</tr>
          
    <tr class="form">
        <td align="right">
            <label for="phone">Phone #</label>
        </td>
        <td>
            <input type="text" 
                    size="13" 
                    maxlength="13" 
                    id="phone" 
                    name="phone" 
                    placeholder="(713)555-1212"
            >
            <span id="phone_text">  
        </td>
    </tr>
   <tr class="form">
  <td align="right">
        <label for="email">Email</label>
      </td>
      <td>
            <input type="email"
                size="50"
                maxlength="50"
               id="email"
               name="email"
               placeholder="name@domain.tld"
               required>
  </td>
</tr>
        <tr class="form">
            <td align="right">Do you have Insurance?</td>
                <td>
                    <label>
                        <input type="radio" name="insurance" value="Yes" required> Yes </label>
                    <label>
                        <input type="radio" name="insurance" value="No">No </label>
                </td>
            </tr>
           <!-- checkbox-->
            <tr class="form">
  <td align="right">Select all that apply</td>
  <td>
    <label><input type="checkbox" name="conditions" value="Asthma"> Asthma</label><br>
    <label><input type="checkbox" name="conditions" value="Allergy"> Allergy</label><br>
    <label><input type="checkbox" name="conditions" value="Hypertension"> Hypertension</label><br>
    <label><input type="checkbox" name="conditions" value="Medication"> Medication</label><br>
    <label><input type="checkbox" name="conditions" value="Fever"> Fever</label>
  </td>
</tr>
      <tr class="form">
          <td align="right">Are you vaccinated?</td>
          <td>
              <label><input type="radio" name="vaccinated" value="Yes" required> Yes</label>
              <label><input type="radio" name="vaccinated" value="No" required> No</label>
          </td>
      </tr>    
       <!--textarea-->
<tr class="form">
    <td align="right">
    <label for="reason">Reason for Visit</label>
        </td>
<td>
    <textarea id="reason" name="reason" rows="3" cols="50"
        placeholder="Describe your symptoms..."></textarea>
</td>
</tr>
  <tr>
  <td align="right">
    <label for="healthRating">Overall Health Rating</label>
  </td>
  <td>
    <input type="range"
           id="healthRating"
           name="healthRating"
           min="1"
           max="10"
           value="5"
           oninput="updateSliderValue()">

    <div id="sliderValue">5</div>
  </td>
</tr>
       <!-- Portal account creation section-->
       <tr class="form">
  <th class="form" colspan="3">Create Portal Account</th>
</tr>

<tr class="form">
  <td align="right">
    <label for="userId">User ID</label>
  </td>
  <td>
    <input type="text"
           id="userId"
           name="userId"
           maxlength="20"
           required
           placeholder="(max 20)">
  </td>
</tr>

<tr class="form">
  <td align="right">
    <label for="password">Password</label>
  </td>
  <td>
    <input type="password"
    minlength="10"
    maxlength="20"
    id="password"
    name="password"
    required
    placeholder="(req'd)"
    onkeyup="checkPasswords()">
      
  </td>
</tr>

<tr class="form">
  <td align="right">
    <label for="password2">Re-enter Password</label>
  </td>
  <td>
    <input type="password"
           minlength="10"
           maxlength="20"
           id="password2"
           name="password2"
           required
           placeholder="(req'd)"
           onkeyup="checkPasswords()">
  </td>
</tr>

<tr>
  <td colspan="3">
    <center>
      <input type="button" value="Review" onclick="reviewForm()">
      &nbsp;&nbsp;&nbsp;&nbsp;
      <input type="submit" value="Submit">
      &nbsp;&nbsp;&nbsp;&nbsp;
      <input type="reset" value="Reset">
    </center>
  </td>
</tr>
 </table>
</form> 

    <div id="reviewSection"></div>
            
        </div>
        <div id="footer">
            <p> Brazos Healthcare Clinic</p>
            <p>PO Box 183141 | Sugar Land, TX 77132

                <button onclick="alert('Contact usa at:infor@BRclinic.com')">
                    Contact Us
                </button>
        </div>
        <!-- Load external JavaScript -->
       <script src="homework2.js"></script>
</body>
<!-- End of file: homework2.html -->
</html>
